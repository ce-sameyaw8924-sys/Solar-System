<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System</title>
    <script src="script/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #000">
      <!-- ==================== ASSETS ==================== -->
      <a-assets>
        <img id="stars" src="texture/2k_stars_milky_way.jpg" />
        <img id="sun" src="texture/2k_sun.jpg" />
        <img id="mercury" src="texture/2k_mercury.jpg" />
        <img id="venus" src="texture/2k_venus_atmosphere.jpg" />
        <img id="earth" src="texture/2k_earth_daymap.jpg" />
        <img id="moon" src="texture/2k_moon.jpg" />
        <img id="mars" src="texture/2k_mars.jpg" />
        <img id="jupiter" src="texture/2k_jupiter.jpg" />
        <img id="saturn" src="texture/2k_saturn.jpg" />
        <img id="saturnRing" src="texture/2k_saturn_ring_alpha.png" />
        <img id="uranus" src="texture/2k_uranus.jpg" />
        <img id="neptune" src="texture/2k_neptune.jpg" />
      </a-assets>

      <!-- ==================== SKY ==================== -->
      <a-sky src="#stars" radius="500"></a-sky>

      <!-- ==================== CAMERA ==================== -->
      <a-entity position="0 30 50" rotation="-25 0 0">
        <a-camera
          fov="60"
          wasd-controls-enabled="true"
          look-controls-enabled="true"
        ></a-camera>
      </a-entity>

      <!-- ==================== AMBIENT LIGHT ==================== -->
      <a-entity light="type: ambient; color: #FFF; intensity: 0.6"></a-entity>

      <!-- ==================== SUN ==================== -->
      <a-sphere
        src="#sun"
        radius="3"
        position="0 0 0"
        material="shader: flat; src: #sun"
        light="type: point; intensity: 2; distance: 0; decay: 0; color: #FFF"
        animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"
      >
      </a-sphere>

      <!-- ==================== MERCURY (orbit ~6) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 4000; easing: linear; loop: true"
      >
        <a-sphere
          material="shader: flat; src: #mercury"
          radius="0.35"
          position="6 0 0"
          animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true"
        >
        </a-sphere>
      </a-entity>

      <!-- ==================== VENUS (orbit ~9) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 7000; easing: linear; loop: true"
      >
        <a-sphere
          material="shader: flat; src: #venus"
          radius="0.6"
          position="9 0 0"
          animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true"
        >
        </a-sphere>
      </a-entity>

      <!-- ==================== EARTH (orbit ~13) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"
      >
        <a-entity position="13 0 0">
          <!-- Earth -->
          <a-sphere
            material="shader: flat; src: #earth"
            radius="0.65"
            animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true"
          >
          </a-sphere>
          <!-- Moon orbiting Earth -->
          <a-entity
            animation="property: rotation; to: 0 360 0; dur: 3000; easing: linear; loop: true"
          >
            <a-sphere
              material="shader: flat; src: #moon"
              radius="0.18"
              position="1.5 0 0"
            ></a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- ==================== MARS (orbit ~17) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 14000; easing: linear; loop: true"
      >
        <a-sphere
          material="shader: flat; src: #mars"
          radius="0.45"
          position="17 0 0"
          animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true"
        >
        </a-sphere>
      </a-entity>

      <!-- ==================== JUPITER (orbit ~22) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 22000; easing: linear; loop: true"
      >
        <a-sphere
          material="shader: flat; src: #jupiter"
          radius="1.5"
          position="22 0 0"
          animation="property: rotation; to: 0 360 0; dur: 4000; easing: linear; loop: true"
        >
        </a-sphere>
      </a-entity>

      <!-- ==================== SATURN (orbit ~28) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 30000; easing: linear; loop: true"
      >
        <a-entity position="28 0 0">
          <!-- Saturn body -->
          <a-sphere
            material="shader: flat; src: #saturn"
            radius="1.2"
            animation="property: rotation; to: 0 360 0; dur: 4500; easing: linear; loop: true"
          >
          </a-sphere>
          <!-- Saturn ring -->
          <a-ring
            material="src: #saturnRing; side: double; transparent: true; opacity: 0.9"
            radius-inner="1.5"
            radius-outer="2.5"
            rotation="-75 0 0"
          >
          </a-ring>
        </a-entity>
      </a-entity>

      <!-- ==================== URANUS (orbit ~34) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 40000; easing: linear; loop: true"
      >
        <a-sphere
          material="shader: flat; src: #uranus"
          radius="0.9"
          position="34 0 0"
          animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true"
        >
        </a-sphere>
      </a-entity>

      <!-- ==================== NEPTUNE (orbit ~40) ==================== -->
      <a-entity
        animation="property: rotation; to: 0 360 0; dur: 50000; easing: linear; loop: true"
      >
        <a-sphere
          material="shader: flat; src: #neptune"
          radius="0.85"
          position="40 0 0"
          animation="property: rotation; to: 0 360 0; dur: 5500; easing: linear; loop: true"
        >
        </a-sphere>
      </a-entity>

      <!-- ==================== ORBIT RINGS (visual guides) ==================== -->
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="5.98"
        radius-outer="6.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="8.98"
        radius-outer="9.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="12.98"
        radius-outer="13.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="16.98"
        radius-outer="17.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="21.98"
        radius-outer="22.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="27.98"
        radius-outer="28.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="33.98"
        radius-outer="34.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
      <a-ring
        material="color: #555; side: double; opacity: 0.3; transparent: true"
        radius-inner="39.98"
        radius-outer="40.02"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-ring>
    </a-scene>
  </body>
</html>
